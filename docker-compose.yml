version: '3.8'

services:
  #  Express Backend 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kra_backend
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    environment:
      # Override DB_HOST to use the service name instead of localhost
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Hot-reload in dev: mount source, exclude node_modules
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  # PostgreSQL Database 
  db:
    image: postgres:15-alpine
    container_name: kra_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: kra_network
      POSTGRES_USER: kra_user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-run seed/init SQL on first start
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kra_user -d kra_network']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
